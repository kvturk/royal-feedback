<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Pastanesi | Müşteri Geri Bildirim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .royal-purple { color: #8e44ad; }
        .bg-royal-purple { background-color: #8e44ad; }
        .table-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .status-taze { background-color: #d4f4e2; color: #27ae60; border-radius: 8px; font-weight: 600; padding: 4px 12px; }
        .status-kritik { background-color: #fce4e4; color: #e74c3c; border-radius: 8px; font-weight: 600; padding: 4px 12px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-royal-purple p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-800">Müşteri Yorum Geçmişi <span class="text-gray-400 font-light text-sm">(Son Gelenler)</span></h1>
                </div>
            </div>

            <div class="flex gap-2">
                <select id="subeFilter" class="border border-gray-200 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-purple-200 transition-all text-sm text-gray-600">
                    <option value="Tümü">Tüm Şubeler</option>
                </select>
                <button onclick="fetchReviews()" class="flex items-center gap-2 border border-gray-200 rounded-xl px-4 py-2 hover:bg-gray-50 transition-all text-sm text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Yenile
                </button>
            </div>
        </div>

        <div class="bg-white rounded-3xl overflow-hidden table-shadow overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-100 text-purple-400 text-sm font-semibold uppercase tracking-wider">
                    <tr>
                        <th class="px-6 py-5">İşlem Tarihi</th>
                        <th class="px-6 py-5">Şube / Personel</th>
                        <th class="px-6 py-5">Puan / Yıldız</th>
                        <th class="px-6 py-5">Yorum Detayı</th>
                        <th class="px-6 py-5 text-center">Durum Sonucu</th>
                        <th class="px-6 py-5 text-right">Harita</th>
                    </tr>
                </thead>
                <tbody id="reviewTable" class="divide-y divide-gray-50 text-gray-600 text-sm">
                    </tbody>
            </table>
        </div>
        <p class="mt-4 text-center text-gray-400 text-xs">Royal Pastanesi Internal Feedback System v1.0</p>
    </div>

    <script>
        async function fetchReviews() {
            try {
                const response = await fetch('yorumlar.json?t=' + new Date().getTime());
                const reviews = await response.json();
                renderTable(reviews);
                updateFilters(reviews);
            } catch (err) {
                console.error("Veri yüklenemedi:", err);
            }
        }

        function renderTable(data) {
            const tableBody = document.getElementById('reviewTable');
            const filterValue = document.getElementById('subeFilter').value;
            
            tableBody.innerHTML = '';

            data.forEach(item => {
                if (filterValue !== "Tümü" && item.sube_adi !== filterValue) return;

                const date = new Date(item.iso_date).toLocaleString('tr-TR');
                const badgeClass = item.rating >= 4 ? 'status-taze' : 'status-kritik';
                const badgeText = item.rating >= 4 ? 'MEMNUNİYET' : 'KRİTİK';
                
                let stars = '⭐'.repeat(item.rating);

                tableBody.innerHTML += `
                    <tr class="hover:bg-purple-50/30 transition-colors">
                        <td class="px-6 py-5 whitespace-nowrap font-medium">🕒 ${date}</td>
                        <td class="px-6 py-5">
                            <div class="font-bold text-gray-800">${item.sube_adi}</div>
                            <div class="text-xs text-gray-400 font-light">👤 ${item.user.name}</div>
                        </td>
                        <td class="px-6 py-5">
                            <div class="text-purple-600 font-bold text-lg">${stars}</div>
                            <div class="text-xs text-purple-300 font-light italic">${item.rating}/5 Puan</div>
                        </td>
                        <td class="px-6 py-5 max-w-xs overflow-hidden text-ellipsis italic">
                            "${item.snippet || 'Sadece puan verilmiş.'}"
                        </td>
                        <td class="px-6 py-5 text-center">
                            <span class="${badgeClass}">${badgeText}</span>
                        </td>
                        <td class="px-6 py-5 text-right font-mono text-red-500 font-bold underline">
                            <a href="${item.link}" target="_blank" class="hover:text-red-700 transition-colors">YORUMU AÇ</a>
                        </td>
                    </tr>
                `;
            });
        }

        function updateFilters(data) {
            const filter = document.getElementById('subeFilter');
            const uniqueSubeler = [...new Set(data.map(item => item.sube_adi))];
            
            if (filter.options.length > 1) return; // Zaten doluysa tekrar ekleme

            uniqueSubeler.forEach(sube => {
                const option = document.createElement('option');
                option.value = sube;
                option.text = sube;
                filter.appendChild(option);
            });
        }

        document.getElementById('subeFilter').addEventListener('change', fetchReviews);
        fetchReviews(); // İlk açılışta veriyi çek
    </script>
</body>
</html>
